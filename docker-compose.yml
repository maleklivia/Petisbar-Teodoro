services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petisbar}
      POSTGRES_USER: ${POSTGRES_USER:-petisbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no arquivo .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    command: ["node", "scripts/migrate.js"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?defina APP_DOMAIN no arquivo .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/index.html:ro
      - ./cardapio.html:/srv/cardapio.html:ro
      - ./pages:/srv/pages:ro
      - ./components:/srv/components:ro
      - ./css:/srv/css:ro
      - ./js:/srv/js:ro
      - ./assets:/srv/assets:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [api]
    networks: [internal]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
