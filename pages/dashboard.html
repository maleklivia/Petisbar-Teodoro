<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Petisbar Teodoro</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/modules.css">
  <link rel="stylesheet" href="../css/pedidos.css">
</head>
<body class="app-body" data-page="dashboard">
  <div class="app-layout">
    <aside id="sidebar-slot"></aside>
    <div id="header-slot"></div>

    <main class="app-main" id="page-content">
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-header__left">
          <h2 class="page-title-main">Visão Geral</h2>
          <span class="badge badge-gold">Julho 2026</span>
        </div>
      </div>

      <!-- KPI Row -->
      <div class="kpi-row" id="kpi-row">
        <!-- renderizado por app.js → Modules.dashboard._renderKpis() -->
      </div>

      <!-- Order Stats Bar -->
      <div class="order-stats-bar" id="order-stats-bar">
        <!-- renderizado por app.js → Modules.dashboard._renderOrderStats() -->
      </div>

      <!-- Catalog Stats Bar -->
      <div class="catalog-bar" id="catalog-bar">
        <!-- renderizado por app.js → Modules.dashboard._renderCatalogStats() -->
      </div>

      <!-- Content Grid -->
      <div class="content-grid">
        <!-- Main: Pedidos Recentes -->
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">Pedidos Recentes</span>
            <a class="panel__link" href="pedidos.html">Ver todos →</a>
          </div>
          <div class="panel__body" id="recent-orders">
            <!-- renderizado por app.js -->
          </div>
        </div>

        <!-- Sidebar: Mais Vendidos + Alertas -->
        <div class="side-stack">
          <div class="panel">
            <div class="panel__header">
              <span class="panel__title">Mais Vendidos</span>
            </div>
            <div class="panel__body" id="top-products">
              <!-- renderizado por app.js -->
            </div>
          </div>

          <div class="panel">
            <div class="panel__header">
              <span class="panel__title">Alertas de Estoque</span>
            </div>
            <div class="panel__body" id="stock-alerts">
              <!-- renderizado por app.js -->
            </div>
          </div>

          <div class="panel" id="custo-alerts-panel">
            <div class="panel__header">
              <span class="panel__title">Alertas de Custo</span>
            </div>
            <div class="panel__body" id="custo-alerts">
              <!-- renderizado por app.js -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/core/event-bus.js"></script>
  <script src="../js/core/logger.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/stores.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
